name: "🐛 Bug Report"
description: Report a bug in CORTEX
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in the details below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Call `ingestText(...)` with ...
        2. Then call `query(...)` with ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages or screenshots if applicable.
    validations:
      required: true

  - type: dropdown
    id: layer
    attributes:
      label: Affected Layer
      description: Which CORTEX layer does this bug affect?
      multiple: true
      options:
        - Foundation (core/)
        - Storage (storage/)
        - Vector Compute (root backends)
        - Embeddings (embeddings/)
        - Hippocampus (hippocampus/)
        - Cortex (cortex/)
        - Daydreamer
        - Runtime Harness (runtime/)
        - CI / Build
        - Documentation
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser / Runtime
      description: Browser version, Electron version, or Node/Bun version.
      placeholder: "Chrome 120, Electron 28, Bun 1.3.10"
